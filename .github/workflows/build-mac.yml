name: Build macOS App

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue app
        run: ELECTRON_BUILD=true npx vue-cli-service build --mode production
        env:
          VUE_APP_GROQ_API_KEY: ${{ secrets.VUE_APP_GROQ_API_KEY }}

      - name: Build Electron app
        run: npx electron-builder --mac --publish never

      - name: Publish to GitHub Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release/TypeMate-arm64.dmg"
          tag: latest
          name: Latest Build
          body: |
            Latest build from commit ${{ github.sha }}

            **Download TypeMate for macOS (Apple Silicon)**
          allowUpdates: true
          removeArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
